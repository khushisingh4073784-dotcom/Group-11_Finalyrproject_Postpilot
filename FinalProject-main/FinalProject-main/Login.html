<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link rel="stylesheet" href="./css/Login.css" />
  </head>

  <body>
    <div class="login-container">
      <h2>Login</h2>

      <div class="input-box">
        <input type="text" id="username" placeholder="Username" />
        <span class="icon">👤</span>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" />
        <span class="icon" onclick="togglePassword(this)">👁</span>
      </div>

      <div class="options">
        <label> <input type="checkbox" /> Remember me </label>
        <a href="./forget.html">Forgot password?</a>
      </div>

      <button type="button" onclick="login()">Login</button>

      <p class="register">
        Don't have an account? <a href="./Registration_form.html">Register</a>
      </p>
    </div>

    <!-- POPUP -->
    <div class="popup" id="popup">
      <div class="popup-box">
        <p id="popupMessage"></p>
        <button onclick="closePopup()">OK</button>
      </div>
    </div>

    <script>
      function showPopup(message) {
        document.getElementById("popupMessage").innerText = message;
        document.getElementById("popup").style.display = "flex";
      }

      function closePopup() {
        document.getElementById("popup").style.display = "none";
      }

      function togglePassword(element) {
        const input = document.getElementById("password");

        if (input.type === "password") {
          input.type = "text";
          element.innerHTML = "🙈";
        } else {
          input.type = "password";
          element.innerHTML = "👁";
        }
      }

      function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const currentHost = window.location.hostname || "localhost";
        const apiBaseUrl = `http://${currentHost}:3000`;

        if (!username || !password) {
          showPopup("Enter username and password ❌");
          return;
        }

        fetch(`${apiBaseUrl}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ username, password }),
        })
          .then(async (res) => {
            const text = await res.text();
            let data = {};

            if (text) {
              try {
                data = JSON.parse(text);
              } catch (e) {
                throw new Error(text);
              }
            }

            if (!res.ok) {
              throw new Error(data.error || data.message || `HTTP ${res.status}`);
            }

            return data;
          })
          .then((data) => {
             console.log("Login response:", data);
if (data.role === "admin") {

  localStorage.setItem("adminLogged","true");
  localStorage.setItem("adminName",data.name);

  window.location.replace("./AdminModule/admin.html");

}else if (data.role === "user") {

  const session = {
    employeeId: data.employeeId,
    name: data.name,
    assigned: data.assigned,
    loginTime: Date.now()
  };

  localStorage.setItem("loggedInUser", JSON.stringify(session));
  localStorage.setItem("employeeId", data.employeeId);
  localStorage.setItem("loggedUser", username);
  window.location.href = "./UserModule/user.html";
} 

else {
              showPopup("Invalid credentials ❌");
            }
          })
          .catch((err) => {
            const message = err && err.message ? err.message : "Server error";
            if (
              message === "Failed to fetch" ||
              message === "Load failed" ||
              message.includes("NetworkError")
            ) {
              showPopup(`Cannot connect to server. Start backend on ${apiBaseUrl} ❌`);
              return;
            }
            showPopup(`${message} ❌`);
          });
      }
    </script>
  </body>
</html>
